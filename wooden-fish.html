<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电子木鱼</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      zoom: 1;
    }

    /* 模拟菜单栏 - 可拖动区域 */
    .menu-bar {
      width: 100%;
      height: 32px;
      background: rgba(30, 30, 30, 0.6);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    .menu-left {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }
    .menu-icon { font-size: 14px; }
    .menu-title {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      font-weight: 500;
    }
    .menu-right {
      display: flex;
      align-items: center;
      gap: 7px;
      -webkit-app-region: no-drag;
    }
    .ctrl-btn {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 9px;
      line-height: 16px;
      text-align: center;
      opacity: 0.8;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ctrl-btn:hover { opacity: 1; transform: scale(1.15); }
    .btn-close { background: #ff5f57; color: #820000; }
    .btn-reset { background: #28c840; color: #006500; }
    .btn-minimize { background: #ffbd2e; color: #825700; }

    /* 内容区域 */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      width: 100%;
      padding: 8px 0;
    }

    /* 指示器 */
    .indicators {
      position: absolute;
      top: 8px;
      left: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      -webkit-app-region: no-drag;
    }
    .indicator {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 8px;
      color: #fff;
    }
    .indicator-auto {
      background: rgba(102, 126, 234, 0.8);
      display: none;
    }
    .indicator-auto.active { display: block; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .indicator-sound {
      background: rgba(255,255,255,0.15);
      color: #ccc;
    }

    /* 木鱼 SVG */
    .fish-svg {
      width: 130px;
      height: 150px;
      cursor: pointer;
      transition: transform 0.08s ease;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.5));
      -webkit-app-region: no-drag;
    }
    .fish-svg:active { transform: scale(0.88); }
    .fish-svg.knock { animation: knock 0.15s ease; }
    @keyframes knock { 0% { transform: scale(1); } 50% { transform: scale(0.82); } 100% { transform: scale(1); } }

    /* 功德文字 */
    .merit-text {
      position: absolute;
      font-size: 20px;
      font-weight: bold;
      pointer-events: none;
      opacity: 0;
      animation: floatUp 1.2s ease forwards;
      text-shadow: 0 0 15px currentColor;
    }
    @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-90px) scale(1.4); } }

    /* 涟漪 */
    .ripple {
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid;
      pointer-events: none;
      animation: rippleAnim 0.7s ease-out forwards;
    }
    @keyframes rippleAnim { 0% { transform: scale(0.4); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

    /* 计数器 */
    .counter-area {
      margin-top: 8px;
      text-align: center;
      -webkit-app-region: no-drag;
    }
    .counter { font-size: 26px; font-weight: bold; text-shadow: 0 0 15px currentColor; }
    .counter-label { font-size: 10px; opacity: 0.7; margin-top: 1px; }

    /* 倒计时区域 */
    .countdown-area {
      margin-top: 8px;
      text-align: center;
      padding: 5px 14px;
      border-radius: 8px;
      background: rgba(0,0,0,0.2);
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: all 0.2s ease;
      min-width: 80px;
    }
    .countdown-area.hidden { display: none; }
    .countdown-area:hover { background: rgba(0,0,0,0.3); }
    .countdown-area.editing { background: rgba(102, 126, 234, 0.3); }
    .countdown-area.running { background: rgba(255, 100, 100, 0.2); }
    .countdown-area.finished { animation: alarmPulse 0.5s ease infinite; }
    @keyframes alarmPulse { 0%, 100% { background: rgba(255, 100, 100, 0.3); } 50% { background: rgba(255, 50, 50, 0.6); } }
    .countdown-display { font-size: 15px; font-weight: bold; color: #fff; font-family: 'Courier New', monospace; }
    .countdown-label { font-size: 9px; color: rgba(255,255,255,0.5); margin-top: 1px; }
    .countdown-input {
      background: transparent; border: none; color: #fff;
      font-size: 15px; font-weight: bold; font-family: 'Courier New', monospace;
      text-align: center; width: 60px; outline: none;
    }
    .countdown-input::placeholder { color: rgba(255,255,255,0.4); }

    /* 调整大小手柄 */
    .resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 16px;
      height: 16px;
      cursor: nwse-resize;
      -webkit-app-region: no-drag;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .resize-handle:hover { opacity: 1; }
    .resize-handle::after {
      content: '';
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 8px;
      height: 8px;
      border-right: 2px solid rgba(255,255,255,0.5);
      border-bottom: 2px solid rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>
  <!-- 菜单栏 - 可拖动 -->
  <div class="menu-bar">
    <div class="menu-left">
      <span class="menu-icon">🪵</span>
      <span class="menu-title">电子木鱼</span>
    </div>
    <div class="menu-right">
      <button class="ctrl-btn btn-reset" id="resetBtn" title="重置计数">↺</button>
      <button class="ctrl-btn btn-minimize" id="minimizeBtn" title="最小化">−</button>
      <button class="ctrl-btn btn-close" id="closeBtn" title="关闭">×</button>
    </div>
  </div>

  <!-- 内容区域 -->
  <div class="content-area">
    <!-- 指示器 -->
    <div class="indicators">
      <div class="indicator indicator-auto" id="autoIndicator">⚡ 自动</div>
      <div class="indicator indicator-sound" id="soundIndicator">🪵 经典</div>
    </div>

    <!-- 调整大小手柄 -->
    <div class="resize-handle" id="resizeHandle"></div>

    <!-- 木鱼 -->
    <svg class="fish-svg" id="fishSvg" viewBox="0 0 200 230" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="woodGrain" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" id="wood1" style="stop-color:#D4A574"/>
          <stop offset="30%" id="wood2" style="stop-color:#C4956A"/>
          <stop offset="60%" id="wood3" style="stop-color:#B8860B"/>
          <stop offset="100%" id="wood4" style="stop-color:#A0764A"/>
        </linearGradient>
        <radialGradient id="bowlShine" cx="35%" cy="30%" r="65%">
          <stop offset="0%" id="bowlLight" style="stop-color:#E8C89E"/>
          <stop offset="50%" id="bowlMid" style="stop-color:#B8860B"/>
          <stop offset="100%" id="bowlDark" style="stop-color:#6B4423"/>
        </radialGradient>
        <radialGradient id="strikeShine" cx="40%" cy="35%" r="60%">
          <stop offset="0%" id="strikeLight" style="stop-color:#DEB887"/>
          <stop offset="100%" id="strikeDark" style="stop-color:#A0522D"/>
        </radialGradient>
        <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/></filter>
      </defs>

      <!-- 底座 -->
      <ellipse cx="100" cy="200" rx="55" ry="10" fill="#3E2723" opacity="0.6"/>
      <rect x="55" y="185" width="90" height="18" rx="3" fill="#5D4037"/>
      <rect x="60" y="188" width="80" height="12" rx="2" fill="#4E342E"/>
      <line x1="65" y1="194" x2="135" y2="194" stroke="#6D4C41" stroke-width="1" opacity="0.5"/>

      <!-- 碗体 -->
      <ellipse cx="100" cy="130" rx="72" ry="65" fill="url(#bowlShine)" filter="url(#shadow)"/>

      <!-- 侧面纹理 -->
      <path d="M 30 130 Q 50 155 70 145 Q 100 165 130 145 Q 150 155 170 130" stroke="url(#woodGrain)" stroke-width="3" fill="none" opacity="0.6"/>
      <path d="M 35 145 Q 60 168 100 160 Q 140 168 165 145" stroke="url(#woodGrain)" stroke-width="2" fill="none" opacity="0.4"/>
      <path d="M 42 158 Q 70 175 100 170 Q 130 175 158 158" stroke="url(#woodGrain)" stroke-width="1.5" fill="none" opacity="0.3"/>

      <!-- 顶部 -->
      <ellipse cx="100" cy="80" rx="68" ry="40" fill="url(#woodGrain)"/>

      <!-- 敲击面 -->
      <ellipse cx="100" cy="80" rx="45" ry="25" fill="url(#strikeShine)" stroke="#8B4513" stroke-width="2"/>
      <ellipse cx="100" cy="80" rx="28" ry="15" fill="#CD853F" opacity="0.8"/>

      <!-- 高光 -->
      <ellipse cx="80" cy="68" rx="18" ry="8" fill="rgba(255,255,255,0.2)"/>
      <ellipse cx="70" cy="110" rx="12" ry="20" fill="rgba(255,255,255,0.08)"/>

      <!-- 鱼形雕刻 -->
      <g transform="translate(100, 80)" opacity="0.3">
        <ellipse cx="0" cy="0" rx="20" ry="10" fill="none" stroke="#5D4037" stroke-width="1.5"/>
        <circle cx="-18" cy="0" r="5" fill="none" stroke="#5D4037" stroke-width="1"/>
        <path d="M 18 0 Q 25 -8 22 -12 M 18 0 Q 25 8 22 12" stroke="#5D4037" stroke-width="1" fill="none"/>
        <circle cx="-16" cy="-2" r="1.5" fill="#5D4037"/>
      </g>

      <!-- 装饰圈 -->
      <ellipse cx="100" cy="80" rx="50" ry="28" fill="none" stroke="#8B6914" stroke-width="1" opacity="0.5"/>

      <!-- 敲击棒 -->
      <g transform="translate(155, 45) rotate(35)">
        <rect x="-3" y="0" width="6" height="45" rx="3" fill="#6D4C41"/>
        <ellipse cx="0" cy="-5" rx="9" ry="7" fill="#5D4037" stroke="#4E342E" stroke-width="1"/>
        <ellipse cx="0" cy="-5" rx="6" ry="4.5" fill="#6D4C41"/>
      </g>
    </svg>

    <div class="counter-area">
      <div class="counter" id="counter" style="color: #ffd700;">0</div>
      <div class="counter-label" id="counterLabel" style="color: #ffd700;">功德</div>
    </div>

    <div class="countdown-area" id="countdownArea">
      <div class="countdown-display" id="countdownDisplay">00:00</div>
      <div class="countdown-label">双击设置倒计时</div>
    </div>
  </div>

  <script>
    // ========== 配置 ==========
    let count = 0, settings = {}, audioCtx = null, customAudioBuffer = null, autoTimer = null;
    const counterEl = document.getElementById('counter');
    const counterLabelEl = document.getElementById('counterLabel');
    const fishSvg = document.getElementById('fishSvg');
    const contentArea = document.querySelector('.content-area');
    const autoIndicator = document.getElementById('autoIndicator');
    const soundIndicator = document.getElementById('soundIndicator');
    const countdownArea = document.getElementById('countdownArea');

    const skinColors = {
      classic: { wood: ['#D4A574','#C4956A','#B8860B','#A0764A'], bowl: ['#E8C89E','#B8860B','#6B4423'], strike: ['#DEB887','#A0522D','#CD853F'], text: '#ffd700', ripple: 'rgba(255,215,0,0.6)' },
      jade: { wood: ['#A8E6CF','#88D8B0','#50C878','#3DAF6A'], bowl: ['#C8F7DC','#50C878','#228B22'], strike: ['#90EE90','#2E8B57','#66CDAA'], text: '#90EE90', ripple: 'rgba(144,238,144,0.6)' },
      gold: { wood: ['#FFE135','#FFD700','#DAA520','#CC9900'], bowl: ['#FFF8DC','#FFD700','#B8860B'], strike: ['#FFE4B5','#DAA520','#FFEC8B'], text: '#FFD700', ripple: 'rgba(255,215,0,0.6)' },
      silver: { wood: ['#E8E8E8','#D0D0D0','#C0C0C0','#A8A8A8'], bowl: ['#F5F5F5','#C0C0C0','#808080'], strike: ['#E0E0E0','#909090','#D3D3D3'], text: '#E0E0E0', ripple: 'rgba(192,192,192,0.6)' },
      rose: { wood: ['#FFD5D5','#FFB6C1','#E8A090','#C47A6C'], bowl: ['#FFE4E1','#E8A090','#A0522D'], strike: ['#FFC0CB','#C47A6C','#FFB6C1'], text: '#FFB6C1', ripple: 'rgba(255,182,193,0.6)' },
      dark: { wood: ['#606060','#505050','#404040','#303030'], bowl: ['#707070','#404040','#1A1A1A'], strike: ['#5A5A5A','#2A2A2A','#4A4A4A'], text: '#888888', ripple: 'rgba(100,100,100,0.6)' }
    };
    const soundNames = { default:'🪵 经典', bowl:'🔔 颂钵', bell:'🎐 风铃', drum:'🥁 小鼓', click:'👆 清脆', custom:'🎵 自定义' };

    // ========== 初始化 ==========
    function init() {
      loadSettings(); loadCount(); applySkin(); updateSoundIndicator(); setupAutoMode(); applyCountdownVisibility();
      if (window.utools) {
        try { const { ipcRenderer } = require('electron'); ipcRenderer.on('settings-updated', (e, s) => applyNewSettings(s)); } catch(e) {}
      }
      window.addEventListener('settings-updated', (e) => applyNewSettings(e.detail));
      setInterval(reloadSettings, 2000);
    }
    function loadSettings() {
      if (window.utools) { const s = utools.dbStorage.getItem('muyu_settings'); settings = s ? {...getDefaultSettings(),...s} : getDefaultSettings(); }
      else settings = getDefaultSettings();
    }
    function getDefaultSettings() { return { volume:0.7, skin:'classic', sound:'default', autoInterval:0, reminderInterval:0, customSoundPath:null, hotkey:'Space', opacity:100, showCountdown:true }; }
    function applyNewSettings(s) { if(!s)return; settings={...settings,...s}; applySkin(); updateSoundIndicator(); setupAutoMode(); applyOpacity(); applyCountdownVisibility(); customAudioBuffer=null; }
    function applyCountdownVisibility() { countdownArea.classList.toggle('hidden', settings.showCountdown===false); }
    function applyOpacity() { document.body.style.opacity=(settings.opacity??100)/100; }
    function reloadSettings() {
      if(window.utools){const s=utools.dbStorage.getItem('muyu_settings');if(s){const n={...getDefaultSettings(),...s};if(JSON.stringify(n)!==JSON.stringify(settings)){settings=n;applySkin();updateSoundIndicator();setupAutoMode();applyOpacity();applyCountdownVisibility();}}}
    }
    function loadCount() {
      if(window.utools){const t=new Date().toISOString().split('T')[0];count=(utools.dbStorage.getItem('muyu_stats_'+t)||{count:0}).count;}else count=parseInt(localStorage.getItem('muyu_count')||'0');
      counterEl.textContent=count;
    }
    function saveCount() {
      if(window.utools){const t=new Date().toISOString().split('T')[0];let s=utools.dbStorage.getItem('muyu_stats_'+t)||{count:0,records:[]};s.count=count;s.records.push(Date.now());utools.dbStorage.setItem('muyu_stats_'+t,s);}
      else localStorage.setItem('muyu_count',count.toString());
    }

    // ========== 皮肤 ==========
    function applySkin() {
      const s=skinColors[settings.skin]||skinColors.classic;
      document.getElementById('wood1').style.stopColor=s.wood[0];
      document.getElementById('wood2').style.stopColor=s.wood[1];
      document.getElementById('wood3').style.stopColor=s.wood[2];
      document.getElementById('wood4').style.stopColor=s.wood[3];
      document.getElementById('bowlLight').style.stopColor=s.bowl[0];
      document.getElementById('bowlMid').style.stopColor=s.bowl[1];
      document.getElementById('bowlDark').style.stopColor=s.bowl[2];
      document.getElementById('strikeLight').style.stopColor=s.strike[0];
      document.getElementById('strikeDark').style.stopColor=s.strike[1];
      counterEl.style.color=s.text; counterLabelEl.style.color=s.text;
    }
    function updateSoundIndicator() { soundIndicator.textContent=soundNames[settings.sound]||'🪵 经典'; }

    // ========== 音效 ==========
    function getAudioCtx() { if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
    function playMuyuSound() {
      const c=getAudioCtx(),v=settings.volume;
      if(settings.sound==='custom'&&settings.customSoundPath){playCustomSound(c,v);return;}
      switch(settings.sound){case'bowl':playBowlSound(c,v);break;case'bell':playBellSound(c,v);break;case'drum':playDrumSound(c,v);break;case'click':playClickSound(c,v);break;default:playDefaultSound(c,v);}
    }
    function playDefaultSound(c,v){const n=c.currentTime;const o1=c.createOscillator(),g1=c.createGain();o1.type='sine';o1.frequency.setValueAtTime(800,n);o1.frequency.exponentialRampToValueAtTime(200,n+.08);g1.gain.setValueAtTime(.4*v,n);g1.gain.exponentialRampToValueAtTime(.001,n+.15);o1.connect(g1);g1.connect(c.destination);o1.start(n);o1.stop(n+.15);const o2=c.createOscillator(),g2=c.createGain();o2.type='triangle';o2.frequency.setValueAtTime(400,n);o2.frequency.exponentialRampToValueAtTime(150,n+.2);g2.gain.setValueAtTime(.2*v,n);g2.gain.exponentialRampToValueAtTime(.001,n+.25);o2.connect(g2);g2.connect(c.destination);o2.start(n);o2.stop(n+.25);}
    function playBowlSound(c,v){const n=c.currentTime;[261.63,392,523.25,659.26].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.15*v,n);g.gain.exponentialRampToValueAtTime(.001,n+2);o.connect(g);g.connect(c.destination);o.start(n+i*.02);o.stop(n+2);});}
    function playBellSound(c,v){const n=c.currentTime;[1047,1319,1568].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.2*v,n+i*.05);g.gain.exponentialRampToValueAtTime(.001,n+.8+i*.1);o.connect(g);g.connect(c.destination);o.start(n+i*.05);o.stop(n+1);});}
    function playDrumSound(c,v){const n=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.setValueAtTime(150,n);o.frequency.exponentialRampToValueAtTime(50,n+.1);g.gain.setValueAtTime(.5*v,n);g.gain.exponentialRampToValueAtTime(.001,n+.15);o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+.15);}
    function playClickSound(c,v){const n=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.type='square';o.frequency.setValueAtTime(2000,n);o.frequency.exponentialRampToValueAtTime(500,n+.03);g.gain.setValueAtTime(.3*v,n);g.gain.exponentialRampToValueAtTime(.001,n+.05);o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+.05);}
    function playCustomSound(c,v){if(customAudioBuffer){const s=c.createBufferSource();s.buffer=customAudioBuffer;const g=c.createGain();g.gain.value=v;s.connect(g);g.connect(c.destination);s.start();}else fetch(settings.customSoundPath).then(r=>r.arrayBuffer()).then(b=>c.decodeAudioData(b)).then(d=>{customAudioBuffer=d;playCustomSound(c,v);}).catch(()=>playDefaultSound(c,v));}

    // ========== 倒计时 ==========
    let countdownInterval=null,countdownRemaining=0,countdownTotal=0,isEditingCountdown=false,isCountdownFinished=false;
    const countdownDisplay=document.getElementById('countdownDisplay');
    const countdownLabel=countdownArea.querySelector('.countdown-label');
    function formatTime(s){return`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;}
    function updateCountdownDisplay(){countdownDisplay.textContent=formatTime(countdownRemaining);}
    function enterEditMode(){
      if(isCountdownFinished)stopCountdownAlarm();if(countdownInterval){clearInterval(countdownInterval);countdownInterval=null;}
      isEditingCountdown=true;countdownArea.classList.add('editing');countdownArea.classList.remove('running','finished');
      const inp=document.createElement('input');inp.type='text';inp.className='countdown-input';inp.placeholder='分:秒 或 分钟';inp.value=countdownRemaining>0?formatTime(countdownRemaining):'';
      countdownDisplay.style.display='none';countdownLabel.textContent='输入后按回车或点击别处';countdownArea.appendChild(inp);inp.focus();inp.select();
      inp.addEventListener('blur',()=>parseAndStartCountdown(inp.value));
      inp.addEventListener('keydown',(e)=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value='';inp.blur();}});
    }
    function parseAndStartCountdown(v){
      if(!isEditingCountdown)return;isEditingCountdown=false;countdownArea.classList.remove('editing');
      const inp=countdownArea.querySelector('.countdown-input');if(inp)inp.remove();countdownDisplay.style.display='';
      const t=v.trim();if(!t){countdownRemaining=0;updateCountdownDisplay();countdownLabel.textContent='双击设置倒计时';return;}
      let s=0;if(t.includes(':')){const p=t.split(':');s=(parseInt(p[0])||0)*60+(parseInt(p[1])||0);}else if(t.includes('.'))s=Math.round(parseFloat(t)*60);else if(parseInt(t)>60)s=parseInt(t);else s=parseInt(t)*60;
      if(s<=0){countdownRemaining=0;updateCountdownDisplay();countdownLabel.textContent='双击设置倒计时';return;}startCountdown(s);
    }
    function startCountdown(sec){
      if(countdownInterval)clearInterval(countdownInterval);countdownRemaining=sec;countdownTotal=sec;isCountdownFinished=false;
      countdownArea.classList.add('running');countdownArea.classList.remove('finished');countdownLabel.textContent='点击暂停';updateCountdownDisplay();
      countdownInterval=setInterval(()=>{countdownRemaining--;updateCountdownDisplay();if(countdownRemaining<=0){clearInterval(countdownInterval);countdownInterval=null;onCountdownFinished();}},1000);
    }
    function pauseCountdown(){if(countdownInterval){clearInterval(countdownInterval);countdownInterval=null;countdownArea.classList.remove('running');countdownLabel.textContent='点击继续';}}
    function resumeCountdown(){
      if(countdownRemaining>0&&!countdownInterval){countdownArea.classList.add('running');countdownLabel.textContent='点击暂停';
      countdownInterval=setInterval(()=>{countdownRemaining--;updateCountdownDisplay();if(countdownRemaining<=0){clearInterval(countdownInterval);countdownInterval=null;onCountdownFinished();}},1000);}
    }
    function onCountdownFinished(){
      isCountdownFinished=true;countdownArea.classList.remove('running');countdownArea.classList.add('finished');countdownLabel.textContent='点击停止';playAlarmSound();
      if(window.utools){utools.showNotification('⏰ 倒计时结束！');utools.sendToParent('countdown-finished',{total:countdownTotal});}
    }
    function stopCountdownAlarm(){isCountdownFinished=false;countdownArea.classList.remove('finished');countdownRemaining=0;updateCountdownDisplay();countdownLabel.textContent='双击设置倒计时';}
    function playAlarmSound(){const c=getAudioCtx(),n=c.currentTime,v=settings.volume||.7;for(let i=0;i<6;i++){const o=c.createOscillator(),g=c.createGain();o.type='square';o.frequency.value=i%2===0?880:660;g.gain.setValueAtTime(.3*v,n+i*.2);g.gain.exponentialRampToValueAtTime(.001,n+i*.2+.15);o.connect(g);g.connect(c.destination);o.start(n+i*.2);o.stop(n+i*.2+.15);}}
    countdownArea.addEventListener('click',(e)=>{if(isEditingCountdown||e.target.classList.contains('countdown-input'))return;if(isCountdownFinished)stopCountdownAlarm();else if(countdownInterval)pauseCountdown();else if(countdownRemaining>0)resumeCountdown();});
    countdownArea.addEventListener('dblclick',(e)=>{if(!isEditingCountdown){e.preventDefault();enterEditMode();}});

    // ========== 视觉效果 ==========
    function showMeritText(){const s=skinColors[settings.skin]||skinColors.classic;const t=document.createElement('div');t.className='merit-text';t.textContent='功德+1';t.style.color=s.text;t.style.left=`calc(50% + ${(Math.random()-.5)*80}px - 25px)`;t.style.top='30px';contentArea.appendChild(t);setTimeout(()=>t.remove(),1200);}
    function showRipple(){const s=skinColors[settings.skin]||skinColors.classic;const r=document.createElement('div');r.className='ripple';r.style.borderColor=s.ripple;r.style.left='calc(50% - 50px)';r.style.top='25px';contentArea.appendChild(r);setTimeout(()=>r.remove(),700);}

    // ========== 自动模式 ==========
    function setupAutoMode(){if(autoTimer){clearInterval(autoTimer);autoTimer=null;}if(settings.autoInterval>0){autoIndicator.classList.add('active');autoTimer=setInterval(knock,settings.autoInterval*1000);}else autoIndicator.classList.remove('active');}

    // ========== 敲击 ==========
    function knock(){count++;saveCount();counterEl.textContent=count;fishSvg.classList.remove('knock');void fishSvg.offsetWidth;fishSvg.classList.add('knock');playMuyuSound();showMeritText();showRipple();if(window.utools)utools.sendToParent('muyu-knock',{count});}
    fishSvg.addEventListener('click',knock);
    document.addEventListener('keydown',(e)=>{if(e.code===settings.hotkey){e.preventDefault();knock();}});
    document.getElementById('resetBtn').addEventListener('click',(e)=>{e.stopPropagation();count=0;saveCount();counterEl.textContent=count;});
    document.getElementById('closeBtn').addEventListener('click',(e)=>{e.stopPropagation();window.close();});
    document.getElementById('minimizeBtn').addEventListener('click',(e)=>{e.stopPropagation();if(window.utools)utools.sendToParent('minimize-window');});

    // ========== 窗口调整大小 ==========
    const resizeHandle=document.getElementById('resizeHandle');
    let isResizing=false,startWidth=0,startHeight=0,startX=0,startY=0;
    const BASE_WIDTH=220,BASE_HEIGHT=340;
    let currentZoom=1;
    function loadZoom(){if(window.utools){const s=utools.dbStorage.getItem('muyu_window_zoom');if(s)currentZoom=Math.max(.5,Math.min(2,parseFloat(s)));applyZoom();}}
    function saveZoom(){if(window.utools)utools.dbStorage.setItem('muyu_window_zoom',currentZoom.toString());}
    function applyZoom(){document.body.style.zoom=currentZoom;}
    resizeHandle.addEventListener('mousedown',(e)=>{e.preventDefault();isResizing=true;startX=e.screenX;startY=e.screenY;startWidth=window.innerWidth;startHeight=window.innerHeight;document.body.style.cursor='nwse-resize';document.body.style.userSelect='none';});
    document.addEventListener('mousemove',(e)=>{if(!isResizing)return;const w=Math.max(110,startWidth+e.screenX-startX),h=Math.max(170,startHeight+e.screenY-startY);currentZoom=Math.max(.5,Math.min(2,Math.min(w/BASE_WIDTH,h/BASE_HEIGHT)));applyZoom();if(window.utools)utools.sendToParent('resize-window',{width:w,height:h});});
    document.addEventListener('mouseup',()=>{if(isResizing){isResizing=false;document.body.style.cursor='';document.body.style.userSelect='';saveZoom();}});
    resizeHandle.addEventListener('dblclick',(e)=>{e.preventDefault();currentZoom=1;applyZoom();saveZoom();if(window.utools)utools.sendToParent('resize-window',{width:BASE_WIDTH,height:BASE_HEIGHT});});

    // ========== 启动 ==========
    init(); loadZoom();
  </script>
</body>
</html>
